                effective_price:
                    type: string
        SubmitRequest:
            required:
                - type
                - name
                - description
                - diplomacy
                - coordinates
                - attachments
            type: object
            properties:
                type:
                    enum:
                        - TYPE_UNSPECIFIED
                        - CAMP
                    type: string
                    format: enum
                name:
                    type: string
                description:
                    type: string
                diplomacy:
                    type: string
                coordinates:
                    $ref: '#/components/schemas/Vector2'
                attachments:
                    type: array
                    items:
                        $ref: '#/components/schemas/SubmitRequest_SubmitAttachment'
        SubmitRequest_SubmitAttachment:
            required:
                - url
                - description
            type: object
            properties:
                url:
                    type: string
                description:
                    type: string
        SubmitResponse:
            type: object
            properties: {}
        TagReference:
            required:
                - id
            type: object
            properties:
                id:
                    type: string
            description: Reference to tag in other messages
        TotalOnlineResponse:
            type: object
            properties:
                online:
                    type: integer
                    format: int32
                max_online:
                    type: integer
                    format: int32
        Transaction:
            type: object
            properties:
                id:
                    type: string
                player_id:
                    type: string
                amount:
                    type: string
                type:
                    type: string
                reason:
                    type: string
                purchase_id:
                    type: string
                created_at:
                    type: string
                    format: date-time
        UpdateAvatarRequest:
            required:
                - avatar
                - user_id
            type: object
            properties:
                avatar:
                    type: string
                    format: bytes
                user_id:
                    type: string
        UpdateShopItemRequest:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                description:
                    type: string
                image_url:
                    type: string
                    description: Leave empty to keep the existing image.
                price:
                    type: string
                is_available:
                    type: boolean
                code:
                    type: string
                item_type:
                    enum:
                        - ITEM_TYPE_UNSPECIFIED
                        - ITEM_TYPE_ITEM
                        - ITEM_TYPE_KIT
                    type: string
                    format: enum
                entries:
                    type: array
                    items:
                        $ref: '#/components/schemas/KitEntry'
                has_discount:
                    type: boolean
                discount_percent:
                    type: integer
                    format: int32
        UpdateShopItemResponse:
            type: object
            properties:
                item:
                    $ref: '#/components/schemas/ShopItem'
        UploadTarget:
            type: object
            properties:
                post_url:
                    type: string
                    description: 'POST endpoint: the client sends multipart/form-data (fields + file).'
                fields:
                    type: object
                    additionalProperties:
                        type: string
                    description: Form fields to send together with the file (policy, signature, key, ...).
                public_url:
                    type: string
                    description: Public URL of the object after upload — the client passes it to the target domain.
        User:
            type: object
            properties:
                user_id:
                    type: string
                user_game_name:
                    type: string
                avatar:
                    $ref: '#/components/schemas/User_Image'
                user_name:
                    type: string
                previous_nickname:
                    type: string
                is_online:
                    type: boolean
        User_Image:
            type: object
            properties:
                original:
                    type: string
                x96:
                    type: string
                x48:
                    type: string
        Vector2:
            type: object
            properties:
                x:
                    type: integer
                    format: int32
                y:
                    type: integer
                    format: int32
        VerificationStatusResponse:
            type: object
            properties:
                status:
                    type: string
                rejection_reason:
                    type: string
        VerifyStatusResponse:
            type: object
            properties:
                status:
                    type: string
        WorldTimeResponse:
            type: object
            properties:
                time:
                    type: string
