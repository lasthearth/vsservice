                        - LEADERBOARD_FILTER_KILLS
                        - LEADERBOARD_FILTER_ONLINE
                    type: string
                    format: enum
                - name: limit
                  in: query
                  description: |-
                    The maximum number of entries to return.
                     If unspecified, 25 entry will be returned.
                  schema:
                    type: integer
                    format: int32
