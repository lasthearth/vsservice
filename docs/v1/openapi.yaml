    /v1/news:
        get:
            tags:
                - NewsService
            description: |-
                List news with pagination. View count is incremented for each item returned.
                 Default page size is 15, maximum is 50.

                 Errors:
                   - INTERNAL (500): database failure
            operationId: NewsService_ListNews
            parameters:
                - name: page_size
                  in: query
                  description: |-
                    The maximum number of news to return. The service may return fewer than
                     this value.
                     If unspecified, at most 15 news will be returned.
                     The maximum value is 50; values above 50 will be coerced to 50.
                  schema:
                    type: integer
                    format: int32
                - name: page_token
                  in: query
                  description: |-
                    A page token, received from a previous `ListBooks` call.
                     Provide this to retrieve the subsequent page.

                     When paginating, all other parameters provided to `ListBooks` must match
                     the call that provided the page token.
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListNewsResponse'
        post:
            tags:
                - NewsService
            description: |-
                Create a news entry. Requires admin privileges.
                 Preview image is stored as WebP. Broadcasts a notification to all users.

                 Errors:
                   - UNAUTHENTICATED (401): missing or invalid auth token
                   - PERMISSION_DENIED (403): insufficient privileges
                   - INTERNAL (500): storage or database failure
            operationId: NewsService_CreateNews
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateNewsRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/News'
