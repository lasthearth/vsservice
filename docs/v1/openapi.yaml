                   - INTERNAL (500): database failure
            operationId: NewsService_GetNews
            parameters:
                - name: id
                  in: path
                  description: The unique identifier of the news item to retrieve.
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
