syntax = "proto3";

package donate.v1;

import "google/protobuf/timestamp.proto";

message ShopItem {
  string id = 1;
  string name = 2;
  string description = 3;
  string image_url = 4;
  int64 price = 5;
  bool is_available = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message CreateShopItemRequest {
  string name = 1;
  string description = 2;
  bytes image = 3;
  int64 price = 4;
}

message CreateShopItemResponse {
  ShopItem item = 1;
}

message UpdateShopItemRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  // Leave empty to keep the existing image.
  bytes image = 4;
  int64 price = 5;
  bool is_available = 6;
}

message UpdateShopItemResponse {
  ShopItem item = 1;
}

message DeleteShopItemRequest {
  string id = 1;
}

message DeleteShopItemResponse {}

message ListShopItemsRequest {}

message ListShopItemsResponse {
  repeated ShopItem items = 1;
}
