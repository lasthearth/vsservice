syntax = "proto3";

package donate.v1;

message AddCoinsRequest {
  string player_id = 1;
  string player_name = 2;
  int64 amount = 3;
  string reason = 4;
}

message AddCoinsResponse {
  int64 coins = 1;
}

message DeductCoinsRequest {
  string player_id = 1;
  int64 amount = 2;
  string reason = 3;
}

message DeductCoinsResponse {
  int64 coins = 1;
}

message GetMyBalanceRequest {}

message GetMyBalanceResponse {
  int64 coins = 1;
}

message AdminGetPlayerBalanceRequest {
  string player_id = 1;
}

message AdminGetPlayerBalanceResponse {
  string player_id = 1;
  string player_name = 2;
  int64 coins = 3;
}

message ListWalletsRequest {
  string page_token = 1;
  int64 limit = 2;
}

message ListWalletsResponse {
  repeated WalletBalance wallets = 1;
  string next_page_token = 2;
}

message WalletBalance {
  string player_id = 1;
  string player_name = 2;
  int64 coins = 3;
}
