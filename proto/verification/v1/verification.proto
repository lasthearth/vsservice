syntax = "proto3";

package verification.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";

// Represents verification service
service VerificationService {
  option (google.api.default_host) = "api.lasthearth.ru";

  // List all pending verification requests. Requires admin privileges.
  //
  // Errors:
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - PERMISSION_DENIED (403): insufficient privileges
  //   - INTERNAL (500): database failure
  rpc List(ListRequest) returns (ListResponse) {
    option (google.api.http) = {get: "/v1/verifications"};
  }

  // Submit a verification request for the authenticated user.
  //
  // If a previous request exists and is re-submittable, it will be updated.
  //
  // Errors:
  //   - FAILED_PRECONDITION (400): verification is pending or already approved/verified
  //   - ALREADY_EXISTS (409): user is already verified
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database or SSO failure
  rpc Submit(SubmitRequest) returns (SubmitResponse) {
    option (google.api.http) = {
      post: "/v1/verification"
      body: "*"
    };
  }

  // Approve a user's verification request. Requires admin privileges.
  //
  // Grants the "player" role to the user in SSO.
  //
  // Errors:
  //   - FAILED_PRECONDITION (400): verification is not in pending state
  //   - NOT_FOUND (404): verification request not found
  //   - ALREADY_EXISTS (409): user is already verified
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - PERMISSION_DENIED (403): insufficient privileges
  //   - INTERNAL (500): database or SSO failure
  rpc Approve(ApproveRequest) returns (ApproveResponse) {
    option (google.api.http) = {post: "/v1/verification/{user_id}/approve"};
  }

  // Reject a user's verification request. Requires admin privileges.
  //
  // Errors:
  //   - FAILED_PRECONDITION (400): verification is not in pending state
  //   - NOT_FOUND (404): verification request not found
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - PERMISSION_DENIED (403): insufficient privileges
  //   - INTERNAL (500): database failure
  rpc Reject(RejectRequest) returns (RejectResponse) {
    option (google.api.http) = {
      post: "/v1/verification/{user_id}/reject"
      body: "rejection_reason"
    };
  }

  // Get verification details for the authenticated user.
  //
  // Possible statuses: pending, approved, rejected, verified.
  //
  // Errors:
  //   - NOT_FOUND (404): no verification request found for user
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc Details(DetailsRequest) returns (DetailsResponse) {
    option (google.api.http) = {get: "/v1/verification/details"};
  }

  // Get verification status for a user by ID.
  //
  // Errors:
  //   - NOT_FOUND (404): verification request not found
  //   - INTERNAL (500): database failure
  rpc VerificationStatus(VerifyStatusRequest) returns (VerifyStatusResponse) {
    option (google.api.http) = {get: "/v1/users/{user_id}/verification:status"};
  }

  // Get verification status for a user by in-game name.
  //
  // Errors:
  //   - NOT_FOUND (404): user with given game name not found
  //   - INTERNAL (500): database failure
  rpc VerifyStatusByName(VerifyStatusByNameRequest) returns (VerifyStatusResponse) {
    option (google.api.http) = {get: "/v1/user/verify/{user_game_name}/status"};
  }
}

message ListRequest {}

message ListResponse {
  repeated VerifyUserRequest requests = 1;

  message VerifyUserRequest {
    string id = 1;
    string user_id = 2;
    string user_name = 3;
    string user_game_name = 4;
    string contacts = 5;
    repeated Answer answers = 6;
  }
}

message Answer {
  string question = 1;
  string answer = 2;
}

message SubmitRequest {
  string user_name = 1 [(google.api.field_behavior) = REQUIRED];
  string user_game_name = 2 [(google.api.field_behavior) = REQUIRED];
  string contacts = 3 [(google.api.field_behavior) = REQUIRED];
  repeated Answer answers = 4 [(google.api.field_behavior) = REQUIRED];
}

message SubmitResponse {}

message ApproveRequest {
  string user_id = 1;
}

message ApproveResponse {}

message RejectRequest {
  string user_id = 1;
  RejectReason rejection_reason = 2;
  message RejectReason {
    string rejection_reason = 1;
  }
}

message RejectResponse {}

message DetailsRequest {}

message DetailsResponse {
  string id = 1;
  string status = 2;
  string rejection_reason = 3;
}

message VerifyStatusByNameRequest {
  string user_game_name = 1 [(google.api.field_behavior) = REQUIRED];
}

message VerifyStatusRequest {
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message VerifyStatusResponse {
  string status = 1;
}
