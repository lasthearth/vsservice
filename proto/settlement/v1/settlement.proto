syntax = "proto3";

package settlement.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "settlement/v1/tag.proto";

// Represents settlement management service
service SettlementService {
  option (google.api.default_host) = "api.lasthearth.ru";

  // Submit or level-up a settlement request.
  //
  // On first call creates a new request; on subsequent calls upgrades an approved settlement.
  //
  // Errors:
  //   - INVALID_ARGUMENT (400): attachments is empty; invalid settlement type
  //   - ALREADY_EXISTS (409): settlement request is already pending
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): storage upload or database failure
  rpc Submit(SubmitRequest) returns (SubmitResponse) {
    option (google.api.http) = {
      post: "/v1/settlements"
      body: "*"
    };
  }

  // Get settlement by ID.
  //
  // Errors:
  //   - NOT_FOUND (404): settlement not found
  //   - INTERNAL (500): database failure
  rpc Get(GetRequest) returns (GetResponse) {
    option (google.api.http) = {get: "/v1/settlements/{id}"};
  }

  // Get settlement by user ID.
  //
  // Errors:
  //   - NOT_FOUND (404): settlement not found for user
  //   - INTERNAL (500): database failure
  rpc GetByUserId(GetByUserIdRequest) returns (GetByUserIdResponse) {
    option (google.api.http) = {get: "/v1/users/{user_id}/settlements"};
  }

  // List all approved settlements.
  //
  // Errors:
  //   - INTERNAL (500): database failure
  rpc List(ListRequest) returns (ListResponse) {
    option (google.api.http) = {get: "/v1/settlements"};
  }

  // List pending settlement requests. Requires admin privileges.
  //
  // Errors:
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - PERMISSION_DENIED (403): insufficient privileges
  //   - INTERNAL (500): database failure
  rpc ListPending(ListPendingRequest) returns (ListPendingResponse) {
    option (google.api.http) = {get: "/v1/settlements/verifications"};
  }

  // Approve a settlement request. Requires admin privileges.
  //
  // Errors:
  //   - NOT_FOUND (404): settlement request not found
  //   - FAILED_PRECONDITION (400): settlement request already approved
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - PERMISSION_DENIED (403): insufficient privileges
  //   - INTERNAL (500): database failure
  rpc Approve(ApproveRequest) returns (ApproveResponse) {
    option (google.api.http) = {
      post: "/v1/settlements/{id}/verification:approve"
      body: "*"
    };
  }

  // Reject a settlement request. Requires admin privileges.
  //
  // Errors:
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - PERMISSION_DENIED (403): insufficient privileges
  //   - INTERNAL (500): database failure
  rpc Reject(RejectRequest) returns (RejectResponse) {
    option (google.api.http) = {
      post: "/v1/settlements/{id}/verification:reject"
      body: "*"
    };
  }

  // Get the verification status of a settlement request for a user.
  //
  // Errors:
  //   - NOT_FOUND (404): no settlement request found for user
  //   - INTERNAL (500): database failure
  rpc VerificationStatus(VerificationStatusRequest) returns (VerificationStatusResponse) {
    option (google.api.http) = {get: "/v1/users/{user_id}/settlements/verification:status"};
  }

  // Remove a member from a settlement. Requires admin privileges.
  //
  // Errors:
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - PERMISSION_DENIED (403): insufficient privileges
  //   - INTERNAL (500): database failure
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse) {
    option (google.api.http) = {delete: "/v1/settlements/{settlement_id}/members/{user_id}"};
  }

  // Get all pending invitations for a settlement. Caller must be the settlement leader.
  //
  // Errors:
  //   - PERMISSION_DENIED (403): caller is not the settlement leader
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc GetInvitations(GetInvitationsRequest) returns (GetInvitationsResponse) {
    option (google.api.http) = {get: "/v1/settlements/{settlement_id}/invitations"};
  }

  // Get all invitations belonging to a specific user. Caller must match user_id.
  //
  // Errors:
  //   - PERMISSION_DENIED (403): user_id in request does not match authenticated user
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc GetUserInvitations(GetUserInvitationsRequest) returns (GetUserInvitationsResponse) {
    option (google.api.http) = {get: "/v1/users/{user_id}/settlements/invitations"};
  }

  // Accept an invitation to join a settlement.
  //
  // Errors:
  //   - NOT_FOUND (404): invitation not found
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc AcceptInvitation(AcceptInvitationRequest) returns (AcceptInvitationResponse) {
    option (google.api.http) = {post: "/v1/settlements/invitations/{invitation_id}:accept"};
  }

  // Reject an invitation to join a settlement.
  //
  // Errors:
  //   - NOT_FOUND (404): invitation not found for authenticated user
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc RejectInvitation(RejectInvitationRequest) returns (RejectInvitationResponse) {
    option (google.api.http) = {post: "/v1/settlements/invitations/{invitation_id}:reject"};
  }

  // Invite a user to join a settlement. Caller must be the settlement leader.
  //
  // Errors:
  //   - PERMISSION_DENIED (403): caller is not the settlement leader
  //   - ALREADY_EXISTS (409): user is already a member of the settlement
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc InviteMember(InviteMemberRequest) returns (InviteMemberResponse) {
    option (google.api.http) = {
      post: "/v1/settlements/{settlement_id}/invitations"
      body: "*"
    };
  }

  // Revoke a pending invitation. Caller must be the settlement leader.
  //
  // Errors:
  //   - PERMISSION_DENIED (403): caller is not the settlement leader
  //   - NOT_FOUND (404): invitation not found
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc RevokeInvitation(RevokeInvitationRequest) returns (RevokeInvitationResponse) {
    option (google.api.http) = {
      post: "/v1/settlements/{settlement_id}/invitations/{invitation_id}:revoke"
      body: "*"
    };
  }

  // Update settlement name, description and attachments. Caller must be the settlement leader.
  //
  // Errors:
  //   - NOT_FOUND (404): settlement not found
  //   - PERMISSION_DENIED (403): caller is not the settlement leader
  //   - INVALID_ARGUMENT (400): attachments is empty; invalid attachment url
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc UpdateSettlement(UpdateSettlementRequest) returns (UpdateSettlementResponse) {
    option (google.api.http) = {
      patch: "/v1/settlements/{id}"
      body: "*"
    };
  }

  // Admin update of settlement diplomacy status. Requires settlements:manage scope.
  //
  // Errors:
  //   - NOT_FOUND (404): settlement not found
  //   - PERMISSION_DENIED (403): missing settlements:manage scope
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc AdminUpdateSettlement(AdminUpdateSettlementRequest) returns (AdminUpdateSettlementResponse) {
    option (google.api.http) = {
      patch: "/v1/admin/settlements/{id}"
      body: "*"
    };
  }

  // Add imperial favor points to a settlement. Requires settlements:manage scope.
  //
  // Errors:
  //   - NOT_FOUND (404): settlement not found
  //   - INVALID_ARGUMENT (400): amount must be positive
  //   - PERMISSION_DENIED (403): missing settlements:manage scope
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc AddImperialFavor(AddImperialFavorRequest) returns (AddImperialFavorResponse) {
    option (google.api.http) = {
      post: "/v1/admin/settlements/{settlement_id}/imperial-favor:add"
      body: "*"
    };
  }

  // Deduct imperial favor points from a settlement. Requires settlements:manage scope.
  //
  // Errors:
  //   - NOT_FOUND (404): settlement not found
  //   - INVALID_ARGUMENT (400): amount must be positive; insufficient favor balance
  //   - PERMISSION_DENIED (403): missing settlements:manage scope
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc DeductImperialFavor(DeductImperialFavorRequest) returns (DeductImperialFavorResponse) {
    option (google.api.http) = {
      post: "/v1/admin/settlements/{settlement_id}/imperial-favor:deduct"
      body: "*"
    };
  }

  // List imperial favor log entries for a settlement. Requires settlements:manage scope.
  //
  // Errors:
  //   - PERMISSION_DENIED (403): missing settlements:manage scope
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc ListImperialFavorLogs(ListImperialFavorLogsRequest) returns (ListImperialFavorLogsResponse) {
    option (google.api.http) = {get: "/v1/admin/settlements/{settlement_id}/imperial-favor/logs"};
  }

  // Add a tag to a settlement. Requires tags:manage privilege.
  //
  // Errors:
  //   - NOT_FOUND (404): settlement or tag not found
  //   - ALREADY_EXISTS (409): settlement already has this tag
  //   - FAILED_PRECONDITION (400): tag is not active; too many tags limit reached
  //   - PERMISSION_DENIED (403): requires tags:manage privilege
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc AddTagToSettlement(AddTagToSettlementRequest) returns (AddTagToSettlementResponse) {
    option (google.api.http) = {
      post: "/v1/settlements/{settlement_id}/tags"
      body: "*"
    };
  }

  // Remove a tag from a settlement. Requires tags:manage privilege.
  //
  // Errors:
  //   - NOT_FOUND (404): settlement or tag not found
  //   - PERMISSION_DENIED (403): requires tags:manage privilege
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - INTERNAL (500): database failure
  rpc RemoveTagFromSettlement(RemoveTagFromSettlementRequest) returns (RemoveTagFromSettlementResponse) {
    option (google.api.http) = {delete: "/v1/settlements/{settlement_id}/tags/{tag_id}"};
  }
}

message GetUserInvitationsRequest {
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message GetUserInvitationsResponse {
  repeated Invitation invitations = 1;
}

message AcceptInvitationRequest {
  string invitation_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message AcceptInvitationResponse {}

message RejectInvitationRequest {
  string invitation_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message RejectInvitationResponse {}

message Settlement {
  string id = 1;
  string name = 2;
  SettlementType type = 3;
  string description = 4;
  string diplomacy = 5;
  Member leader = 6;
  repeated Member members = 7;
  repeated Attachment attachments = 8;
  Vector2 coordinates = 9;
  int64 created_at = 10;
  int64 updated_at = 11;
  int64 imperial_favor = 12;
  repeated TagReference tags = 20 [(google.api.field_behavior) = OPTIONAL];
}

enum SettlementType {
  SETTLEMENT_TYPE_UNSPECIFIED = 0;
  CAMP = 1;
  VILLAGE = 2;
  TOWNSHIP = 3;
  CITY = 4;
  PROVINCE = 5;
}

message Member {
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message SubmitRequest {
  Type type = 1 [(google.api.field_behavior) = REQUIRED];
  string name = 2 [(google.api.field_behavior) = REQUIRED];
  string description = 3 [(google.api.field_behavior) = REQUIRED];
  string diplomacy = 4 [(google.api.field_behavior) = REQUIRED];
  Vector2 coordinates = 5 [(google.api.field_behavior) = REQUIRED];
  repeated SubmitAttachment attachments = 6 [(google.api.field_behavior) = REQUIRED];

  message SubmitAttachment {
    string url = 1 [(google.api.field_behavior) = REQUIRED];
    string description = 2 [(google.api.field_behavior) = REQUIRED];
  }

  enum Type {
    TYPE_UNSPECIFIED = 0;
    CAMP = 1;
  }
}

message Vector2 {
  int32 x = 1;
  int32 y = 2;
}

message Attachment {
  string desc = 1 [(google.api.field_behavior) = REQUIRED];
  string url = 2 [(google.api.field_behavior) = REQUIRED];
}

message SubmitResponse {}

message GetRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
}

message GetResponse {
  Settlement settlement = 1;
}

message ListRequest {}

message ListResponse {
  repeated Settlement settlements = 1;
}

message ListPendingRequest {}

message ListPendingResponse {
  repeated Settlement settlements = 1;
}

message ApproveRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
}

message ApproveResponse {}

message RejectRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
  string rejection_reason = 2 [(google.api.field_behavior) = REQUIRED];
}

message RejectResponse {}

message RemoveMemberRequest {
  string settlement_id = 1 [(google.api.field_behavior) = REQUIRED];
  string user_id = 2 [(google.api.field_behavior) = REQUIRED];
}

message RemoveMemberResponse {}

message InviteMemberRequest {
  string settlement_id = 1 [(google.api.field_behavior) = REQUIRED];
  string user_id = 2 [(google.api.field_behavior) = REQUIRED];
}

message InviteMemberResponse {}

message GetInvitationsRequest {
  string settlement_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message GetInvitationsResponse {
  repeated Invitation invitations = 1;
}

message Invitation {
  string id = 1;
  string user_id = 2;
  string settlement_id = 3;
}

message RevokeInvitationRequest {
  string settlement_id = 1 [(google.api.field_behavior) = REQUIRED];
  string invitation_id = 2 [(google.api.field_behavior) = REQUIRED];
}

message RevokeInvitationResponse {
  repeated string invitation_ids = 1;
}

message GetByUserIdRequest {
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message GetByUserIdResponse {
  Settlement settlement = 1;
}

message VerificationStatusRequest {
  string user_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message VerificationStatusResponse {
  string status = 1;
  string rejection_reason = 2;
}

// Request to add a tag to a settlement
message AddTagToSettlementRequest {
  string settlement_id = 1;
  string tag_id = 2;
}

// Response from adding a tag to a settlement
message AddTagToSettlementResponse {
  Settlement settlement = 1;
}

// Request to remove a tag from a settlement
message RemoveTagFromSettlementRequest {
  string settlement_id = 1;
  string tag_id = 2;
}

// Response from removing a tag from a settlement
message RemoveTagFromSettlementResponse {
  Settlement settlement = 1;
}

message AdminUpdateSettlementRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
  string diplomacy = 2 [(google.api.field_behavior) = REQUIRED];
}

message AdminUpdateSettlementResponse {
  Settlement settlement = 1;
}

message UpdateSettlementRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
  string name = 2 [(google.api.field_behavior) = REQUIRED];
  string description = 3 [(google.api.field_behavior) = REQUIRED];
  repeated UpdateAttachment attachments = 4 [(google.api.field_behavior) = REQUIRED];

  message UpdateAttachment {
    string url = 1 [(google.api.field_behavior) = REQUIRED];
    string description = 2 [(google.api.field_behavior) = REQUIRED];
  }
}

message UpdateSettlementResponse {
  Settlement settlement = 1;
}

message ImperialFavorLog {
  string id = 1;
  string settlement_id = 2;
  string admin_id = 3;
  int64 amount = 4;
  string reason = 5;
  int64 created_at = 6;
}

message AddImperialFavorRequest {
  string settlement_id = 1 [(google.api.field_behavior) = REQUIRED];
  int64 amount = 2 [(google.api.field_behavior) = REQUIRED];
  string reason = 3 [(google.api.field_behavior) = OPTIONAL];
}

message AddImperialFavorResponse {
  Settlement settlement = 1;
}

message DeductImperialFavorRequest {
  string settlement_id = 1 [(google.api.field_behavior) = REQUIRED];
  int64 amount = 2 [(google.api.field_behavior) = REQUIRED];
  string reason = 3 [(google.api.field_behavior) = OPTIONAL];
}

message DeductImperialFavorResponse {
  Settlement settlement = 1;
}

message ListImperialFavorLogsRequest {
  string settlement_id = 1 [(google.api.field_behavior) = REQUIRED];
  string next_token = 2 [(google.api.field_behavior) = OPTIONAL];
  string admin_id = 3 [(google.api.field_behavior) = OPTIONAL];
  string order_by = 4 [(google.api.field_behavior) = OPTIONAL];
}

message ListImperialFavorLogsResponse {
  repeated ImperialFavorLog logs = 1;
  string next_token = 2;
}
