syntax = "proto3";

package media.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

// Document-level OpenAPI metadata (title, version, auth scheme) for the whole API.
// Lives here so it ships with the generated OpenAPI spec; applies to all services.
option (gnostic.openapi.v3.document) = {
  info: {
    title: "VS Service API"
    version: "1.0"
    description: "gRPC service with a REST gateway (grpc-gateway) for the LastHearth backend. A single protobuf source generates both the gRPC and REST APIs."
    contact: {name: "lasthearth"}
  }
  components: {
    security_schemes: {
      additional_properties: [
        {
          name: "bearerAuth"
          value: {
            security_scheme: {
              type: "http"
              scheme: "bearer"
              bearer_format: "JWT"
              description: "Logto-issued JWT. Send as `Authorization: Bearer <token>`."
            }
          }
        }
      ]
    }
  }
};

// MediaService issues presigned POST targets for direct uploads to S3.
service MediaService {
  // Returns N presigned POST targets for uploading images.
  //
  // The required scope depends on the purpose (see the server-side per-purpose config).
  //
  // Errors:
  //   - INVALID_ARGUMENT (400): unknown purpose, count out of [1,20], or unsupported content_type
  //   - UNAUTHENTICATED (401)
  //   - PERMISSION_DENIED (403)
  //   - INTERNAL (500)
  rpc CreateUploadUrls(CreateUploadUrlsRequest) returns (CreateUploadUrlsResponse) {
    option (google.api.http) = {
      post: "/v1/media/upload-urls"
      body: "*"
    };
  }
}

// UploadPurpose maps to a concrete bucket on the server side.
// The client never passes a bucket name directly (guards against writing to arbitrary buckets).
enum UploadPurpose {
  UPLOAD_PURPOSE_UNSPECIFIED = 0;
  UPLOAD_PURPOSE_DONATE_SHOP = 1;
  UPLOAD_PURPOSE_SETTLEMENT = 2;
  UPLOAD_PURPOSE_NEWS = 3;
}

message CreateUploadUrlsRequest {
  // Must be a defined purpose other than UNSPECIFIED.
  UploadPurpose purpose = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  // Number of presigned targets to issue. Allowed range: [1, 20].
  int32 count = 2 [(buf.validate.field).int32 = {
    gte: 1
    lte: 20
  }];
  // Optional. MIME type of the uploaded file; must be in the list allowed for
  // the purpose. Empty → any image/* is allowed and the object gets a .webp extension.
  string content_type = 3;
}

message UploadTarget {
  // POST endpoint: the client sends multipart/form-data (fields + file).
  string post_url = 1;
  // Form fields to send together with the file (policy, signature, key, ...).
  map<string, string> fields = 2;
  // Public URL of the object after upload — the client passes it to the target domain.
  string public_url = 3;
}

message CreateUploadUrlsResponse {
  repeated UploadTarget targets = 1;
}
