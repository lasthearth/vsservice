syntax = "proto3";

package rules.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// Represents rules service
service RuleService {
  option (google.api.default_host) = "api.lasthearth.ru";

  // Returns random questions about server rules.
  // Defaults to 5 questions if count is not specified.
  //
  // Errors:
  //   - INTERNAL (500): database failure
  rpc GetRandomQuestions(GetRandomQuestionsRequest) returns (GetRandomQuestionsResponse) {
    option (google.api.http) = {get: "/v1/rules/questions"};
  }

  // Creates a new rule question. Requires admin privileges.
  //
  // Errors:
  //   - INVALID_ARGUMENT (400): question is empty
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - PERMISSION_DENIED (403): insufficient privileges
  //   - INTERNAL (500): database failure
  rpc CreateQuestion(CreateQuestionRequest) returns (CreateQuestionResponse) {
    option (google.api.http) = {
      post: "/v1/rules/question"
      body: "*"
    };
  }

  // Returns all rule questions. Requires admin privileges.
  //
  // Errors:
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - PERMISSION_DENIED (403): insufficient privileges
  //   - INTERNAL (500): database failure
  rpc ListQuestions(ListQuestionsRequest) returns (ListQuestionsResponse) {
    option (google.api.http) = {get: "/v1/rules/questions/list"};
  }

  // Deletes a rule question by ID. Requires admin privileges.
  //
  // Errors:
  //   - UNAUTHENTICATED (401): missing or invalid auth token
  //   - PERMISSION_DENIED (403): insufficient privileges
  //   - NOT_FOUND (404): question not found
  //   - INTERNAL (500): database failure
  rpc DeleteQuestion(DeleteQuestionRequest) returns (DeleteQuestionResponse) {
    option (google.api.http) = {delete: "/v1/rules/question/{id}"};
  }
}

message GetRandomQuestionsRequest {
  // Count of questions to return, if not specified, returns 5 questions
  int32 count = 1;
}

message GetRandomQuestionsResponse {
  repeated Question questions = 1;

  // Represents a question about rules
  message Question {
    string id = 1;
    string question = 2;
  }
}

message CreateQuestionRequest {
  string question = 1;
}

message CreateQuestionResponse {}

message ListQuestionsRequest {}

message ListQuestionsResponse {
  repeated Question questions = 1;

  // Represents a question about rules with admin details
  message Question {
    string id = 1;
    string question = 2;
    string created_by = 3;
    google.protobuf.Timestamp created_at = 4;
  }
}

message DeleteQuestionRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
}

message DeleteQuestionResponse {}
